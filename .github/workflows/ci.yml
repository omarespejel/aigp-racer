name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  review-config:
    name: review config and python smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Validate Qodo and CodeRabbit configs
        run: python scripts/validate_review_configs.py

      - name: Ruff check
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Pytest
        run: python -m pytest

