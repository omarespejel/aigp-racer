# Qodo v2 Git integration configuration for AI Grand Prix review.
# Docs: https://docs.qodo.ai/install-and-configure/configuration-overview/configuration-file

[github_app]
pr_commands = [
  "/agentic_describe",
  "/agentic_review",
]
handle_push_trigger = true
push_commands = [
  "/agentic_review",
]

[review_agent]
comments_location_policy = "both"
inline_comments_severity_threshold = 2
demand_self_review = true
approve_pr_on_self_review = false
issues_user_guidelines = """
Review this as a low-latency autonomous drone-racing repository.

Prioritize:
- hard real-time regressions;
- command-rate violations against the AI Grand Prix <100 Hz ceiling;
- stale telemetry, timestamp drift, or unsafe recovery behavior;
- frame-transform mistakes across camera, body, and NED frames;
- estimator assumptions around the unresolved velocity-telemetry ambiguity;
- UDP frame reassembly failure modes;
- missing tests or fixtures for runtime, perception, estimation, planning, and evaluator changes;
- any LLM, large video model, learned world-model rollout, or DecisionTrace generation that enters the live flight path.

Avoid low-value style comments unless they affect correctness, latency, determinism, or maintainability.
"""
compliance_user_guidelines = """
Enforce the repo's competition and evidence rules:
- disclose FLOSS dependencies, generated-AI use, model weights, datasets, simulator sources, and competition-relevant sources in DISCLOSURE_LEDGER.md;
- keep source-backed claims in docs when discussing AI Grand Prix rules, SDK contracts, technical spec values, papers, timelines, or external competitions;
- preserve the boundary that WorldForge is offline replay/evaluation/DecisionTrace infrastructure, not the live pilot;
- require artifact hashes, evaluator settings, and held-out reliability metrics before promoting a learned policy or AutoRaceEvolve candidate.
"""

[review_agent_ux]
finding_overflow_count = 3
resolved_overflow_count = 1
expand_description = true
expand_code = true
expand_relevance = true
expand_evidence = true
expand_prompt = false

[pr_agentic_description]
publish_as_comment = true

[pr_code_suggestions]
enable_chat_in_code_suggestions = true

[checks]
enable_auto_checks_feedback = true
persistent_comment = true
enable_help_text = true
final_update_message = true

[config]
ignore_pr_title = [
  "^\\[Auto\\]",
  "^Auto",
  "^WIP",
  "^Draft",
]
ignore_pr_labels = [
  "skip-review",
  "generated-only",
]
ignore_languages_frameworks = [
  "protobuf",
]

